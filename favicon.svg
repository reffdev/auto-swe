<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="url(#glow)" stroke-width="1.5" opacity="0.95"/>

  <!-- House/server roof shape -->
  <path d="M32 10 L50 24 L14 24 Z" fill="none" stroke="url(#glow2)" stroke-width="2" stroke-linejoin="round" filter="url(#neon)" opacity="0.9"/>

  <!-- Antenna on roof -->
  <line x1="32" y1="10" x2="32" y2="5" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" filter="url(#neon)"/>
  <circle cx="32" cy="4.5" r="1.8" fill="#38bdf8" filter="url(#softglow)" opacity="0.9"/>

  <!-- Server body -->
  <rect x="17" y="24" width="30" height="30" rx="4" fill="none" stroke="url(#glow2)" stroke-width="1.8" filter="url(#neon)" opacity="0.85"/>

  <!-- Agent "eye" — a glowing orb -->
  <circle cx="32" cy="34" r="6" fill="none" stroke="url(#glow)" stroke-width="1.8" filter="url(#neon)"/>
  <circle cx="32" cy="34" r="2.5" fill="#38bdf8" filter="url(#softglow)"/>
  <circle cx="32" cy="34" r="1" fill="#e0f2fe"/>

  <!-- Circuit traces radiating from eye -->
  <!-- Left traces -->
  <path d="M26 34 L20 34" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round" filter="url(#neon)" opacity="0.7"/>
  <path d="M27 30 L22 27" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round" filter="url(#neon)" opacity="0.7"/>
  <path d="M27 38 L22 41" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round" filter="url(#neon)" opacity="0.7"/>

  <!-- Right traces -->
  <path d="M38 34 L44 34" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round" filter="url(#neon)" opacity="0.7"/>
  <path d="M37 30 L42 27" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round" filter="url(#neon)" opacity="0.7"/>
  <path d="M37 38 L42 41" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round" filter="url(#neon)" opacity="0.7"/>

  <!-- Circuit nodes (small dots at trace ends) -->
  <circle cx="20" cy="34" r="1.3" fill="#a78bfa" filter="url(#softglow)"/>
  <circle cx="44" cy="34" r="1.3" fill="#a78bfa" filter="url(#softglow)"/>
  <circle cx="22" cy="27" r="1.3" fill="#a78bfa" filter="url(#softglow)"/>
  <circle cx="42" cy="27" r="1.3" fill="#a78bfa" filter="url(#softglow)"/>
  <circle cx="22" cy="41" r="1.3" fill="#a78bfa" filter="url(#softglow)"/>
  <circle cx="42" cy="41" r="1.3" fill="#a78bfa" filter="url(#softglow)"/>

  <!-- Bottom status LEDs -->
  <circle cx="24" cy="49" r="1.5" fill="#34d399" filter="url(#softglow)"/>
  <circle cx="30" cy="49" r="1.5" fill="#38bdf8" filter="url(#softglow)"/>
  <circle cx="36" cy="49" r="1.5" fill="#a78bfa" filter="url(#softglow)"/>
  <circle cx="42" cy="49" r="1.5" fill="#34d399" filter="url(#softglow)"/>

</svg>
